# Supabase local dev config. Link your remote project with:
#   supabase login
#   supabase link --project-ref <your-project-ref>
# Then push migrations:
#   supabase db push

project_id = "your-project-ref"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323
